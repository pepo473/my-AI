<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI عبد الرحمن حمزه</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #header {
            background-color: #1a1a2e;
            padding: 14px 20px;
            text-align: center;
            border-bottom: 2px solid #007bff;
        }
        #header h2 {
            color: #007bff;
            font-size: 1.2rem;
        }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            padding: 12px 18px;
            border-radius: 12px;
            max-width: 80%;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .user-msg {
            background-color: #007bff;
            align-self: flex-start;
            border-radius: 12px 12px 0 12px;
        }
        .ai-msg {
            background-color: #2a2a2a;
            align-self: flex-end;
            border: 1px solid #444;
            border-radius: 12px 12px 12px 0;
        }
        #input-area {
            display: flex;
            padding: 15px;
            background-color: #1e1e1e;
            gap: 10px;
            border-top: 1px solid #333;
        }
        #user-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: white;
            outline: none;
            font-size: 15px;
            font-family: inherit;
        }
        #user-input:focus { border-color: #007bff; }
        #send-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            transition: background 0.2s;
        }
        #send-btn:hover { background-color: #0056b3; }
        #send-btn:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="header">
        <h2>🤖 AI عبد الرحمن حمزه</h2>
    </div>
    <div id="chat-box">
        <div class="message ai-msg">مرحباً! أنا <strong>AI عبد الرحمن حمزه</strong>، مساعدك الذكي الشخصي. كيف يمكنني مساعدتك اليوم؟</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." onkeypress="handleEnter(event)">
        <button id="send-btn" onclick="sendMessage()">إرسال</button>
    </div>
    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const sendBtn = document.getElementById('send-btn');
            const question = inputField.value.trim();
            if (!question) return;

            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.textContent = question;
            chatBox.appendChild(userDiv);

            inputField.value = '';
            sendBtn.disabled = true;
            chatBox.scrollTop = chatBox.scrollHeight;

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-msg';
            loadingDiv.textContent = 'يكتب...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: question })
                });
                const data = await response.json();
                loadingDiv.textContent = data.answer || "حدث خطأ غير متوقع";
            } catch (error) {
                loadingDiv.style.color = 'red';
                loadingDiv.textContent = 'عذراً، حدث خطأ. تأكد أن السيرفر يعمل.';
            }

            sendBtn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleEnter(event) {
            if (event.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
